<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passport</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
<header class="topbar">
  <div class="topbar-inner">
    <div>
      <div class="brand-title">🪪 Pub Passport</div>
      <div class="brand-subtitle">Your progress across Westminster</div>
    </div>

    <nav class="menu">
      <a href="index.html">Map</a>
      <a href="passport.html">Passport</a>
      <a href="leaderboard.html">Leaderboard</a>
    </nav>
  </div>
</header>

<main class="page page-narrow">

  <section class="panel">
    <h2>Your Progress</h2>
    <p class="stack-meta">Track your uncovered London</p>

    <div id="progress">Loading...</div>
  </section>

</main>

<script type="module">
import { westminsterPubs } from "./westminster-pubs.js";

const visited = new Set(JSON.parse(localStorage.getItem("visitedPubs") || "[]"));

const total = westminsterPubs.length;

document.getElementById("progress").innerHTML = `
  <div class="mini-stat">
    <div class="mini-stat-label">Visited</div>
    <div class="mini-stat-value">${visited.size}</div>
  </div>
  <div class="mini-stat">
    <div class="mini-stat-label">Total</div>
    <div class="mini-stat-value">${total}</div>
  </div>
  <div class="mini-stat">
    <div class="mini-stat-label">Coverage</div>
    <div class="mini-stat-value">${((visited.size/total)*100).toFixed(1)}%</div>
  </div>
`;
</script>

</body>
</html>
