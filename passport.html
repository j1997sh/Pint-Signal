<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passport • Pint Signal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div>
      <div class="brand-title">🪪 Pub Passport</div>
      <div class="brand-subtitle">Your progress across Westminster</div>
    </div>

    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="passport.html">Passport</a>
    </nav>
  </div>
</header>

<main class="page">

  <section class="panel">
    <div class="panel-header">
      <h2>Your Progress</h2>
    </div>

    <div id="passportStats" class="totaliser-card">
      Loading...
    </div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <h2>Visited Pubs</h2>
    </div>

    <div id="visitedList" class="stack-list"></div>
  </section>

</main>

<script type="module">
import { westminsterPubs } from "./westminster-pubs.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import {
  getAuth,
  signInAnonymously
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

/* =============================
   FIREBASE
============================= */

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "pintsignal.firebaseapp.com",
  projectId: "pintsignal"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* =============================
   ELEMENTS
============================= */

const statsEl = document.getElementById("passportStats");
const visitedListEl = document.getElementById("visitedList");

/* =============================
   COVERAGE CALCULATION
============================= */

function calculateCoverage(visitedPubs) {
  const totalPubs = westminsterPubs.length;
  const visitedCount = visitedPubs.length;

  // simple % for MVP (grid later)
  const percent = totalPubs === 0 ? 0 : (visitedCount / totalPubs) * 100;

  // rough area estimate (200m radius per pub)
  const areaPerPub = Math.PI * (0.2 * 0.2); // km²
  const totalArea = visitedCount * areaPerPub;

  return {
    percent: percent.toFixed(1),
    area: totalArea.toFixed(2),
    visitedCount,
    totalPubs
  };
}

/* =============================
   LOAD DATA
============================= */

async function loadPassport() {
  await signInAnonymously(auth);

  const snap = await getDocs(collection(db, "checkins"));

  const uniquePubIds = new Set();

  snap.forEach(doc => {
    const data = doc.data();
    if (data.pubId) {
      uniquePubIds.add(data.pubId);
    }
  });

  const visitedPubs = westminsterPubs.filter(pub =>
    uniquePubIds.has(pub.id)
  );

  const stats = calculateCoverage(visitedPubs);

  renderStats(stats);
  renderVisited(visitedPubs);
}

/* =============================
   RENDER
============================= */

function renderStats(stats) {
  statsEl.innerHTML = `
    <div class="hero-title">${stats.percent}% uncovered</div>

    <div class="stats-row">
      <div class="mini-stat">
        <div class="mini-stat-label">Visited</div>
        <div class="mini-stat-value">${stats.visitedCount}</div>
      </div>

      <div class="mini-stat">
        <div class="mini-stat-label">Total pubs</div>
        <div class="mini-stat-value">${stats.totalPubs}</div>
      </div>

      <div class="mini-stat">
        <div class="mini-stat-label">Area revealed</div>
        <div class="mini-stat-value">${stats.area} km²</div>
      </div>
    </div>

    <div class="comparison-line">
      Keep exploring to uncover more of Westminster 🍺
    </div>
  `;
}

function renderVisited(pubs) {
  visitedListEl.innerHTML = "";

  if (pubs.length === 0) {
    visitedListEl.innerHTML = `<div class="empty-state">No pubs visited yet</div>`;
    return;
  }

  pubs.forEach(pub => {
    const el = document.createElement("div");
    el.className = "stack-card";

    el.innerHTML = `
      <div class="stack-title">${pub.name}</div>
      <div class="stack-meta">${pub.address || ""}</div>
    `;

    el.onclick = () => {
      window.location.href = `pub.html?id=${pub.id}`;
    };

    visitedListEl.appendChild(el);
  });
}

loadPassport();
</script>

</body>
</html>
