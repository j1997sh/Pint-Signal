<!DOCTYPE html>
<html>
<head>
  <title>Passport</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <a href="index.html">← Home</a>
</header>

<main class="page">

<h2>Passport</h2>
<div id="passport"></div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app=initializeApp({
  apiKey:"AIzaSyB...",
  authDomain:"pintsignal.firebaseapp.com",
  projectId:"pintsignal"
});

const db=getFirestore(app);
const auth=getAuth(app);

async function load(){
  const u=await signInAnonymously(auth);
  const uid=u.user.uid;

  const pubs=await getDocs(collection(db,"pubs"));
  const checkins=await getDocs(collection(db,"checkins"));

  let visited=new Set();
  checkins.forEach(d=>{
    if(d.data().userId===uid) visited.add(d.data().pubId);
  });

  pubs.forEach(doc=>{
    const p=doc.data();
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`${visited.has(doc.id)?"✅":"⬜"} ${p.name}`;
    document.getElementById("passport").appendChild(div);
  });
}

load();
</script>

</body>
</html>
