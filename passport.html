<!DOCTYPE html>
<html>
<head>
  <title>Passport</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <a href="index.html">← Home</a>
</header>

<main class="page">

<h2>Pub Passport</h2>
<div id="progress" class="card"></div>

<div id="passport"></div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyBajTBhYOCXbprdx9ZhxpFny_knmTHstnA",
  authDomain:"pintsignal.firebaseapp.com",
  projectId:"pintsignal"
});

const db = getFirestore(app);
const auth = getAuth(app);

let user;

async function load(){
  const u = await signInAnonymously(auth);
  user = u.user;

  const pubsSnap = await getDocs(collection(db,"pubs"));
  const checkSnap = await getDocs(collection(db,"checkins"));

  let visited = new Set();

  checkSnap.forEach(d=>{
    const data = d.data();
    if(data.userId === user.uid){
      visited.add(data.pubId);
    }
  });

  const total = pubsSnap.size;

  document.getElementById("progress").innerHTML =
    `<b>${visited.size} / ${total} pubs visited</b>`;

  const container = document.getElementById("passport");

  pubsSnap.forEach(doc=>{
    const p = doc.data();
    const isVisited = visited.has(doc.id);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${isVisited ? "✅" : "⬜"} <b>${p.name}</b><br>
      ${p.area}
    `;

    container.appendChild(div);
  });
}

load();
</script>

</body>
</html>
