<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passport</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div>
      <div class="brand-title">Pint Signal 🍺</div>
      <div class="brand-subtitle">Your pub passport</div>
    </div>

    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="passport.html">Passport</a>
      <a href="activity.html">Activity</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="add-pub.html">Add a Pub</a>
    </nav>
  </div>
</header>

<main class="page">

  <!-- HERO -->
  <section class="panel passport-summary-card">
    <div id="passportHero"></div>
  </section>

  <!-- TOTALS -->
  <section class="panel">
    <div class="panel-header">
      <h2>Your Totals</h2>
      <p>Your personal contribution and spend</p>
    </div>
    <div id="personalTotals"></div>
  </section>

  <!-- BADGES -->
  <section class="panel">
    <div class="panel-header">
      <h2>Badges</h2>
      <p>Unlock progress by exploring and submitting prices</p>
    </div>
    <div id="badgeRow" class="badge-row"></div>
  </section>

  <!-- VISITED -->
  <section class="panel">
    <div class="panel-header">
      <h2>Visited</h2>
    </div>
    <div id="visitedPubs" class="passport-grid"></div>
  </section>

  <!-- UNVISITED -->
  <section class="panel">
    <div class="panel-header">
      <h2>To Visit</h2>
    </div>
    <div id="unvisitedPubs" class="passport-grid"></div>
  </section>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import {
  getAuth,
  signInAnonymously
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBajTBhYOCXbprdx9ZhxpFny_knmTHstnA",
  authDomain: "pintsignal.firebaseapp.com",
  projectId: "pintsignal",
  storageBucket: "pintsignal.firebasestorage.app",
  messagingSenderId: "63376472196",
  appId: "1:63376472196:web:2a5bbd8aa62ca176cf6ad1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const heroEl = document.getElementById("passportHero");
const totalsEl = document.getElementById("personalTotals");
const badgeRowEl = document.getElementById("badgeRow");
const visitedEl = document.getElementById("visitedPubs");
const unvisitedEl = document.getElementById("unvisitedPubs");

function formatMoney(v) {
  return `£${Number(v).toFixed(2)}`;
}

function calc(price) {
  const vat = price * 0.20;
  const duty = 0.60;
  const beer = 1.50;
  const overheads = 3.00;

  return {
    vat,
    duty,
    beer,
    overheads,
    gov: vat + duty,
    pub: price - vat - duty - beer - overheads
  };
}

function tier(xp) {
  if (xp >= 300) return "🏆 Legend";
  if (xp >= 150) return "🍺 Regular";
  if (xp >= 75) return "🧭 Explorer";
  return "✨ New Scout";
}

function stamp(pub, visited) {
  const el = document.createElement("button");
  el.className = `passport-stamp ${visited ? "visited" : ""}`;

  el.innerHTML = `
    <div class="stamp-emoji">${visited ? "🍺" : "📍"}</div>
    <div class="stamp-title">${pub.name}</div>
  `;

  el.onclick = () => {
    window.location.href = `pub.html?id=${pub.id}`;
  };

  return el;
}

async function load() {
  const user = await signInAnonymously(auth);
  const uid = user.user.uid;

  const pubsSnap = await getDocs(collection(db, "pubs"));
  const pricesSnap = await getDocs(collection(db, "prices"));
  const checkSnap = await getDocs(collection(db, "checkins"));

  const visited = new Set();

  let totalSpent = 0;
  let totalGov = 0;
  let totalPub = 0;
  let priceCount = 0;

  checkSnap.forEach(doc => {
    const d = doc.data();
    if (d.userId === uid) visited.add(d.pubId);
  });

  pricesSnap.forEach(doc => {
    const d = doc.data();
    if (d.userId === uid) {
      const price = Number(d.price || 0);
      const e = calc(price);

      totalSpent += price;
      totalGov += e.gov;
      totalPub += e.pub;
      priceCount++;
    }
  });

  const pubs = [];
  pubsSnap.forEach(doc => pubs.push({ id: doc.id, ...doc.data() }));

  const visitedCount = visited.size;
  const xp = visitedCount * 10 + priceCount * 15;

  // HERO
  heroEl.innerHTML = `
    <div class="passport-hero-row">
      <div>
        <div class="hero-badge">${tier(xp)}</div>
        <div class="hero-title">${visitedCount} pubs visited</div>
        <div class="stack-meta">${priceCount} prices logged</div>
      </div>
      <div class="passport-xp-pill">${xp} XP</div>
    </div>
  `;

  // TOTALS
  totalsEl.innerHTML = `
    <div class="stats-row">
      <div class="mini-stat">
        <div class="mini-stat-label">Spent</div>
        <div class="mini-stat-value">${formatMoney(totalSpent)}</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-label">Government</div>
        <div class="mini-stat-value">${formatMoney(totalGov)}</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-label">Pub side</div>
        <div class="mini-stat-value">${formatMoney(totalPub)}</div>
      </div>
    </div>

    <div class="comparison-line">
      Pub side <strong>${formatMoney(totalPub)}</strong> vs Government <strong>${formatMoney(totalGov)}</strong>
    </div>
  `;

  // BADGES
  badgeRowEl.innerHTML = `
    <div class="badge-card ${visitedCount>=1?"unlocked":"locked"}">🍺 First Pub</div>
    <div class="badge-card ${visitedCount>=5?"unlocked":"locked"}">🍻 5 Pubs</div>
    <div class="badge-card ${priceCount>=5?"unlocked":"locked"}">💷 Price Scout</div>
  `;

  // LISTS
  visitedEl.innerHTML = "";
  unvisitedEl.innerHTML = "";

  pubs.forEach(pub => {
    if (visited.has(pub.id)) {
      visitedEl.appendChild(stamp(pub, true));
    } else {
      unvisitedEl.appendChild(stamp(pub, false));
    }
  });
}

load();
</script>

</body>
</html>
