<!DOCTYPE html>
<html>
<head>
  <title>Passport</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand-title">Pub Passport</div>
    <div class="menu">
      <a href="index.html">Map</a>
    </div>
  </div>
</div>

<div class="page">

  <div class="card">
    <div class="panel-title">Exploration</div>
    <div class="big-number" id="percent">0%</div>

    <div class="progress-bar">
      <div class="progress-fill" id="bar"></div>
    </div>

    <div class="stat-row">
      <div class="stat">
        <strong id="visited">0</strong>
        <span>Pubs</span>
      </div>

      <div class="stat">
        <strong id="signals">0</strong>
        <span>Signals</span>
      </div>
    </div>
  </div>

</div>

<script>
let visited = JSON.parse(localStorage.getItem("visitedPubs")||"[]");
let signals = JSON.parse(localStorage.getItem("signals")||"[]");

let total = 100;

let percent = Math.floor((visited.length/total)*100);

document.getElementById("percent").innerText = percent+"%";
document.getElementById("bar").style.width = percent+"%";

document.getElementById("visited").innerText = visited.length;
document.getElementById("signals").innerText = signals.length;
</script>

</body>
</html>
