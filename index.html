<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pint Signal</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand-title">Pint Signal</div>
        <div class="brand-subtitle">District Signal Network</div>
      </div>
      <nav class="menu">
        <a href="index.html">Map</a>
        <a href="passport.html">Passport</a>
        <a href="leaderboard.html">Leaderboard</a>
      </nav>
    </div>
  </header>

  <div id="map"></div>
  <div class="map-fog"></div>

  <div class="panel-floating panel-floating-main">
    <div class="panel-title">Signal Network</div>
    <div class="panel-sub">Unlock districts, reveal pubs, and build discovery XP</div>

    <div class="floating-stat-row">
      <div class="floating-stat">
        <span>Signals</span>
        <strong id="signalsValue">0 / 0</strong>
      </div>
      <div class="floating-stat">
        <span>Visible pubs</span>
        <strong id="visiblePubsValue">0</strong>
      </div>
      <div class="floating-stat">
        <span>XP</span>
        <strong id="xpValue">0</strong>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="signalsProgressFill" style="width:0%"></div>
    </div>

    <div class="floating-buttons">
      <button onclick="centerOnUser()">Center on me</button>
      <button onclick="resetProgress()">Reset progress</button>
    </div>

    <div id="mapStatus" class="panel-sub panel-status">Move to a Signal to bring a district online.</div>
  </div>

  <div class="panel-floating panel-floating-districts">
    <div class="panel-title">District Progress</div>
    <div class="panel-sub">Rewards and intel update as districts come online</div>
    <div id="districtList"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { westminsterPubs } from "./westminster-pubs.js";
    import { signals } from "./signals.js";
    import { districts, getDistrictById, getDistrictForPub } from "./districts.js";

    const SIGNAL_RADIUS_METERS = 450;
    const SIGNAL_UNLOCK_DISTANCE_METERS = 50;

    const STORAGE_KEYS = {
      signals: "pint_signal_unlocked_signals",
      visited: "pint_signal_visited_pubs",
      xp: "pint_signal_xp",
      rare: "pint_signal_rare_assignments"
    };

    const REWARD_STEPS = [
      { threshold: 25, label: "Scout" },
      { threshold: 50, label: "Regular" },
      { threshold: 100, label: "Cleared" }
    ];

    const state = {
      unlockedSignals: new Set(JSON.parse(localStorage.getItem(STORAGE_KEYS.signals) || "[]")),
      visitedPubs: new Set(JSON.parse(localStorage.getItem(STORAGE_KEYS.visited) || "[]")),
      xp: Number(localStorage.getItem(STORAGE_KEYS.xp) || "0"),
      rareAssignments: JSON.parse(localStorage.getItem(STORAGE_KEYS.rare) || "{}")
    };

    const map = L.map("map", {
      zoomControl: true,
      preferCanvas: true
    }).setView([51.5007, -0.1290], 14);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: "&copy; OpenStreetMap & CARTO",
      maxZoom: 19
    }).addTo(map);

    let userPos = null;
    let userMarker = null;

    let signalMarkers = [];
    let signalRevealCircles = [];
    let signalGlowCircles = [];
    let districtLabels = [];
    let pubMarkers = [];

    const signalsValueEl = document.getElementById("signalsValue");
    const visiblePubsValueEl = document.getElementById("visiblePubsValue");
    const xpValueEl = document.getElementById("xpValue");
    const signalsProgressFillEl = document.getElementById("signalsProgressFill");
    const mapStatusEl = document.getElementById("mapStatus");
    const districtListEl = document.getElementById("districtList");

    function saveState() {
      localStorage.setItem(STORAGE_KEYS.signals, JSON.stringify([...state.unlockedSignals]));
      localStorage.setItem(STORAGE_KEYS.visited, JSON.stringify([...state.visitedPubs]));
      localStorage.setItem(STORAGE_KEYS.xp, String(state.xp));
      localStorage.setItem(STORAGE_KEYS.rare, JSON.stringify(state.rareAssignments));
    }

    function getStoredCoords(pubId) {
      const raw = localStorage.getItem(`pubcoords_${pubId}`);
      if (!raw) return null;

      try {
        const parsed = JSON.parse(raw);
        if (
          typeof parsed.lat === "number" &&
          typeof parsed.lng === "number" &&
          !Number.isNaN(parsed.lat) &&
          !Number.isNaN(parsed.lng)
        ) {
          return parsed;
        }
      } catch (error) {}

      return null;
    }

    function hasCoordinates(pub) {
      return (
        typeof pub.lat === "number" &&
        typeof pub.lng === "number" &&
        !Number.isNaN(pub.lat) &&
        !Number.isNaN(pub.lng)
      );
    }

    function getResolvedPubs() {
      return westminsterPubs.map(pub => {
        if (hasCoordinates(pub)) return pub;

        const stored = getStoredCoords(pub.id);
        if (stored) {
          return {
            ...pub,
            lat: stored.lat,
            lng: stored.lng
          };
        }

        return pub;
      });
    }

    function getPubRarity(pub) {
      if (!state.rareAssignments[pub.id]) {
        const hash = Array.from(pub.id).reduce((sum, char) => sum + char.charCodeAt(0), 0) % 100;

        if (hash < 5) {
          state.rareAssignments[pub.id] = "legendary";
        } else if (hash < 20) {
          state.rareAssignments[pub.id] = "rare";
        } else if (hash < 45) {
          state.rareAssignments[pub.id] = "notable";
        } else {
          state.rareAssignments[pub.id] = "common";
        }
      }

      return state.rareAssignments[pub.id];
    }

    function getRarityXp(rarity) {
      if (rarity === "legendary") return 60;
      if (rarity === "rare") return 30;
      if (rarity === "notable") return 18;
      return 10;
    }

    function getRarityEmoji(rarity) {
      if (rarity === "legendary") return "🔥";
      if (rarity === "rare") return "✨";
      if (rarity === "notable") return "⭐";
      return "🍺";
    }

    function rarityRank(rarity) {
      if (rarity === "legendary") return 4;
      if (rarity === "rare") return 3;
      if (rarity === "notable") return 2;
      return 1;
    }

    function signalIcon(unlocked, districtId) {
      const district = getDistrictById(districtId);

      return L.divIcon({
        html: `
          <div class="signal-marker ${unlocked ? "signal-unlocked" : "signal-locked"}" style="--signal-color:${district ? district.color : "#d4a24c"};">
            <div class="signal-core">📡</div>
            <div class="signal-ring signal-ring-1"></div>
            <div class="signal-ring signal-ring-2"></div>
          </div>
        `,
        className: "signal-marker-wrap",
        iconSize: [54, 54],
        iconAnchor: [27, 27]
      });
    }

    function pubIcon(pub, visited) {
      const rarity = getPubRarity(pub);

      return L.divIcon({
        html: `
          <div class="pint-marker-ac rarity-${rarity} ${visited ? "pub-visited" : ""}">
            ${getRarityEmoji(rarity)}
          </div>
        `,
        className: "pint-marker-wrap",
        iconSize: [34, 34],
        iconAnchor: [17, 24]
      });
    }

    function clearLayers(list) {
      list.forEach(layer => map.removeLayer(layer));
      list.length = 0;
    }

    function renderDistrictLabels() {
      clearLayers(districtLabels);

      districts.forEach(district => {
        const label = L.marker([district.centerLat, district.centerLng], {
          interactive: false,
          icon: L.divIcon({
            html: `<div class="district-label">${district.name}</div>`,
            className: "district-label-wrap",
            iconSize: [180, 28],
            iconAnchor: [90, 14]
          })
        }).addTo(map);

        districtLabels.push(label);
      });
    }

    function renderSignals() {
      clearLayers(signalMarkers);
      clearLayers(signalRevealCircles);
      clearLayers(signalGlowCircles);

      signals.forEach(signal => {
        const unlocked = state.unlockedSignals.has(signal.id);
        const district = getDistrictById(signal.districtId);

        if (unlocked) {
          const glow = L.circle([signal.lat, signal.lng], {
            radius: SIGNAL_RADIUS_METERS * 1.22,
            stroke: false,
            fillColor: district ? district.color : "#ffd27a",
            fillOpacity: 0.05,
            interactive: false
          }).addTo(map);

          const reveal = L.circle([signal.lat, signal.lng], {
            radius: SIGNAL_RADIUS_METERS,
            color: district ? district.color : "#ffcc73",
            weight: 1,
            fillColor: district ? district.color : "#ffcc73",
            fillOpacity: 0.12,
            interactive: false
          }).addTo(map);

          signalGlowCircles.push(glow);
          signalRevealCircles.push(reveal);
        }

        const marker = L.marker([signal.lat, signal.lng], {
          icon: signalIcon(unlocked, signal.districtId)
        }).addTo(map);

        marker.bindPopup(`
          <div style="min-width:190px;">
            <strong>${signal.name}</strong><br>
            ${district ? district.name : "District"}<br>
            ${unlocked ? "Unlocked ✓" : "Locked"}<br>
            ${unlocked ? "District online." : "Move within 50m to unlock."}
          </div>
        `);

        marker.on("click", () => unlockSignal(signal));
        signalMarkers.push(marker);
      });
    }

    function isPubVisible(pub) {
      return signals.some(signal => {
        if (!state.unlockedSignals.has(signal.id)) return false;
        return map.distance([pub.lat, pub.lng], [signal.lat, signal.lng]) <= SIGNAL_RADIUS_METERS;
      });
    }

    function getVisiblePubs() {
      return getResolvedPubs().filter(pub => hasCoordinates(pub) && isPubVisible(pub));
    }

    function getDistrictPubs(districtId) {
      return getResolvedPubs().filter(pub => getDistrictForPub(pub) === districtId);
    }

    function getDistrictVisitedPubs(districtId) {
      return getDistrictPubs(districtId).filter(pub => state.visitedPubs.has(pub.id));
    }

    function getDistrictCompletionPercent(districtId) {
      const all = getDistrictPubs(districtId);
      const visited = getDistrictVisitedPubs(districtId);
      return all.length ? (visited.length / all.length) * 100 : 0;
    }

    function getDistrictRewardState(districtId) {
      const percent = getDistrictCompletionPercent(districtId);

      return REWARD_STEPS.map(step => ({
        ...step,
        unlocked: percent >= step.threshold
      }));
    }

    function getDistrictIntel(districtId) {
      const districtPubs = getDistrictPubs(districtId)
        .filter(pub => hasCoordinates(pub) && isPubVisible(pub));

      if (districtPubs.length === 0) {
        return {
          bestRare: null,
          nextTarget: null
        };
      }

      const unvisited = districtPubs.filter(pub => !state.visitedPubs.has(pub.id));
      const bestRare = [...districtPubs].sort((a, b) => {
        return rarityRank(getPubRarity(b)) - rarityRank(getPubRarity(a));
      })[0] || null;

      const nextTarget = [...unvisited].sort((a, b) => {
        return rarityRank(getPubRarity(b)) - rarityRank(getPubRarity(a));
      })[0] || null;

      return { bestRare, nextTarget };
    }

    function discoverPub(pub) {
      if (state.visitedPubs.has(pub.id)) return;

      const rarity = getPubRarity(pub);
      const gain = getRarityXp(rarity);

      state.visitedPubs.add(pub.id);
      state.xp += gain;
      saveState();

      mapStatusEl.textContent = `${pub.name} discovered. +${gain} XP (${rarity})`;
      renderAll();
    }

    function renderPubs() {
      clearLayers(pubMarkers);

      const pubs = getVisiblePubs();

      pubs.forEach(pub => {
        const districtId = getDistrictForPub(pub);
        const district = getDistrictById(districtId);
        const rarity = getPubRarity(pub);
        const visited = state.visitedPubs.has(pub.id);

        const marker = L.marker([pub.lat, pub.lng], {
          icon: pubIcon(pub, visited)
        }).addTo(map);

        marker.bindPopup(`
          <div style="min-width:210px;">
            <strong>${pub.name}</strong><br>
            ${district ? district.name : "District unknown"}<br>
            ${pub.address || ""}<br>
            Rarity: ${rarity}<br>
            ${visited ? "Visited ✓" : "Tap to discover and open"}
          </div>
        `);

        marker.on("click", () => {
          if (!visited) {
            discoverPub(pub);
          }
          window.location.href = `pub.html?id=${encodeURIComponent(pub.id)}`;
        });

        pubMarkers.push(marker);
      });
    }

    function renderFloatingStats() {
      const visiblePubs = getVisiblePubs();
      const progress = signals.length ? (state.unlockedSignals.size / signals.length) * 100 : 0;

      signalsValueEl.textContent = `${state.unlockedSignals.size} / ${signals.length}`;
      visiblePubsValueEl.textContent = String(visiblePubs.length);
      xpValueEl.textContent = String(state.xp);
      signalsProgressFillEl.style.width = `${progress}%`;
    }

    function renderDistrictList() {
      districtListEl.innerHTML = districts.map(district => {
        const districtSignals = signals.filter(signal => signal.districtId === district.id);
        const unlockedCount = districtSignals.filter(signal => state.unlockedSignals.has(signal.id)).length;
        const totalPubs = getDistrictPubs(district.id).length;
        const visitedPubs = getDistrictVisitedPubs(district.id).length;
        const completion = getDistrictCompletionPercent(district.id);
        const rewards = getDistrictRewardState(district.id);
        const intel = getDistrictIntel(district.id);
        const online = unlockedCount > 0;

        return `
          <div class="district-row">
            <div class="district-row-top">
              <div class="district-name-wrap">
                <span class="district-dot" style="background:${district.color};"></span>
                <strong>${district.name}</strong>
              </div>
              <span class="district-status ${online ? "district-online" : "district-offline"}">
                ${online ? "Online" : "Locked"}
              </span>
            </div>

            <div class="district-meta">
              Signals ${unlockedCount}/${districtSignals.length} · Visited ${visitedPubs}/${totalPubs}
            </div>

            <div class="district-progress-bar">
              <div
                class="district-progress-fill"
                style="width:${completion}%; background:${district.color};"
              ></div>
            </div>

            <div class="reward-row">
              ${rewards.map(reward => `
                <span class="reward-pill ${reward.unlocked ? "reward-unlocked" : "reward-locked"}">
                  ${reward.threshold}% ${reward.label}
                </span>
              `).join("")}
            </div>

            <div class="intel-card">
              <div class="intel-line">
                <span>Best rare:</span>
                <strong>${intel.bestRare ? `${intel.bestRare.name} (${getPubRarity(intel.bestRare)})` : "No intel yet"}</strong>
              </div>
              <div class="intel-line">
                <span>Next target:</span>
                <strong>${intel.nextTarget ? `${intel.nextTarget.name}` : "District cleared or still locked"}</strong>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderAll() {
      renderDistrictLabels();
      renderSignals();
      renderPubs();
      renderFloatingStats();
      renderDistrictList();
    }

    function unlockSignal(signal) {
      if (!userPos) {
        mapStatusEl.textContent = "Enable location to activate Signals.";
        return;
      }

      const distance = map.distance(userPos, [signal.lat, signal.lng]);

      if (distance > SIGNAL_UNLOCK_DISTANCE_METERS) {
        mapStatusEl.textContent = `${signal.name} is ${Math.round(distance)}m away.`;
        return;
      }

      if (!state.unlockedSignals.has(signal.id)) {
        state.unlockedSignals.add(signal.id);
        state.xp += 50;
        saveState();

        const district = getDistrictById(signal.districtId);
        const intel = getDistrictIntel(signal.districtId);

        mapStatusEl.textContent = `${signal.name} unlocked. ${district ? district.name : "District"} online. +50 XP${intel.nextTarget ? ` · Next target: ${intel.nextTarget.name}` : ""}`;
        renderAll();
      } else {
        mapStatusEl.textContent = `${signal.name} is already online.`;
      }
    }

    navigator.geolocation.watchPosition(
      pos => {
        userPos = [pos.coords.latitude, pos.coords.longitude];

        if (!userMarker) {
          userMarker = L.marker(userPos).addTo(map).bindPopup("You are here");
        } else {
          userMarker.setLatLng(userPos);
        }
      },
      () => {
        mapStatusEl.textContent = "Location unavailable. Signals require location access.";
      },
      {
        enableHighAccuracy: true,
        maximumAge: 10000,
        timeout: 10000
      }
    );

    function centerOnUser() {
      if (userPos) {
        map.setView(userPos, 16);
      }
    }

    function resetProgress() {
      localStorage.removeItem(STORAGE_KEYS.signals);
      localStorage.removeItem(STORAGE_KEYS.visited);
      localStorage.removeItem(STORAGE_KEYS.xp);
      localStorage.removeItem(STORAGE_KEYS.rare);

      state.unlockedSignals = new Set();
      state.visitedPubs = new Set();
      state.xp = 0;
      state.rareAssignments = {};

      mapStatusEl.textContent = "Progress reset.";
      renderAll();
    }

    window.centerOnUser = centerOnUser;
    window.resetProgress = resetProgress;

    renderAll();
  </script>
</body>
</html>
