<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pint Signal</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
<header class="topbar">
  <div class="topbar-inner">
    <div>
      <div class="brand-title">Pint Signal 🍺</div>
      <div class="brand-subtitle">Signal Network</div>
    </div>

    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="passport.html">Passport</a>
      <a href="leaderboard.html">Leaderboard</a>
    </nav>
  </div>
</header>

<main class="page">

  <section class="panel map-panel">
    <div class="panel-header">
      <h2>Signal Network</h2>
      <p>Activate signals to reveal pubs</p>
    </div>

    <div class="map-shell">
      <div id="map"></div>
      <div class="map-overlay-vignette"></div>
    </div>

    <div class="controls-row">
      <button onclick="centerOnUser()">Center</button>
    </div>

    <div id="mapStatus" class="stack-meta top-gap">Move to a signal to unlock it</div>
  </section>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { westminsterPubs } from "./westminster-pubs.js";

/* =========================
   SIGNAL DATA
========================= */

const signals = [
  { id:"parliament", name:"Parliament", lat:51.4995, lng:-0.1248 },
  { id:"trafalgar", lat:51.5080, lng:-0.1281 },
  { id:"bridge", lat:51.5009, lng:-0.1217 },
  { id:"green", lat:51.5065, lng:-0.1426 },
  { id:"buckingham", lat:51.5014, lng:-0.1419 },
  { id:"leicester", lat:51.5113, lng:-0.1281 },
  { id:"soho", lat:51.5136, lng:-0.1365 },
  { id:"waterloo", lat:51.5033, lng:-0.1147 },
  { id:"vauxhall", lat:51.4866, lng:-0.1225 },
  { id:"victoria", lat:51.4952, lng:-0.1442 }
];

/* =========================
   CONFIG
========================= */

const SIGNAL_RADIUS = 450;
const UNLOCK_DISTANCE = 50;

/* =========================
   STATE
========================= */

let unlockedSignals = new Set(
  JSON.parse(localStorage.getItem("signals") || "[]")
);

let map = L.map("map").setView([51.5007, -0.129], 14);

let userPos = null;
let userMarker = null;

let signalMarkers = [];
let pubMarkers = [];

/* =========================
   MAP BASE
========================= */

L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
).addTo(map);

/* =========================
   USER LOCATION
========================= */

navigator.geolocation.watchPosition(pos => {
  userPos = [pos.coords.latitude, pos.coords.longitude];

  if (!userMarker) {
    userMarker = L.marker(userPos).addTo(map);
  } else {
    userMarker.setLatLng(userPos);
  }
});

/* =========================
   SIGNALS
========================= */

function renderSignals() {
  signalMarkers.forEach(m => map.removeLayer(m));
  signalMarkers = [];

  signals.forEach(s => {
    const unlocked = unlockedSignals.has(s.id);

    const marker = L.marker([s.lat, s.lng], {
      icon: L.divIcon({
        html:`<div class="signal ${unlocked ? "on":""}">📡</div>`
      })
    }).addTo(map);

    marker.on("click", () => unlockSignal(s));

    signalMarkers.push(marker);

    if (unlocked) {
      L.circle([s.lat, s.lng], {
        radius: SIGNAL_RADIUS,
        color:"#ffd27a",
        fillOpacity:0.15
      }).addTo(map);
    }
  });
}

/* =========================
   UNLOCK
========================= */

function unlockSignal(signal) {
  if (!userPos) {
    status("Enable location");
    return;
  }

  const dist = map.distance(userPos, [signal.lat, signal.lng]);

  if (dist > UNLOCK_DISTANCE) {
    status("Move closer (" + Math.round(dist) + "m)");
    return;
  }

  if (!unlockedSignals.has(signal.id)) {
    unlockedSignals.add(signal.id);
    localStorage.setItem("signals", JSON.stringify([...unlockedSignals]));

    status("Signal unlocked ✔");

    renderAll();
  }
}

/* =========================
   PUB VISIBILITY
========================= */

function isVisible(pub) {
  return signals.some(s => {
    if (!unlockedSignals.has(s.id)) return false;

    return map.distance([pub.lat,pub.lng],[s.lat,s.lng]) < SIGNAL_RADIUS;
  });
}

/* =========================
   PUBS
========================= */

function renderPubs() {
  pubMarkers.forEach(m => map.removeLayer(m));
  pubMarkers = [];

  westminsterPubs.forEach(pub => {

    if (!pub.lat || !isVisible(pub)) return;

    const marker = L.marker([pub.lat, pub.lng], {
      icon: L.divIcon({
        html:`<div class="pint">🍺</div>`
      })
    }).addTo(map);

    marker.on("click", () => {
      window.location.href = "pub.html?id=" + pub.id;
    });

    pubMarkers.push(marker);
  });
}

/* =========================
   UI
========================= */

function status(msg){
  document.getElementById("mapStatus").innerText = msg;
}

function centerOnUser(){
  if(userPos) map.setView(userPos,16);
}

window.centerOnUser = centerOnUser;

/* =========================
   RENDER
========================= */

function renderAll(){
  renderSignals();
  renderPubs();
}

/* =========================
   START
========================= */

renderAll();

</script>

</body>
</html>
