<!DOCTYPE html>
<html>
<head>
  <title>Pint Signal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="brand-title">Pint Signal 🍺</div>
  <nav class="menu">
    <a href="index.html">Home</a>
    <a href="passport.html">Passport</a>
    <a href="activity.html">Activity</a>
  </nav>
</header>

<main class="page">

<h2>Your Progress</h2>
<div id="xpCard" class="card"></div>

<h2>Cheap Pint Radar</h2>
<div id="cheapest"></div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyBajTBhYOCXbprdx9ZhxpFny_knmTHstnA",
  authDomain:"pintsignal.firebaseapp.com",
  projectId:"pintsignal"
});

const db = getFirestore(app);
const auth = getAuth(app);

let user;

function xpFromData(checkins, prices){
  return (checkins * 10) + (prices * 15);
}

function getBadge(xp){
  if(xp > 200) return "🏆 Pint Legend";
  if(xp > 100) return "🍺 Regular";
  if(xp > 50) return "👣 Explorer";
  return "🆕 New Drinker";
}

async function load(){
  const u = await signInAnonymously(auth);
  user = u.user;

  const checkSnap = await getDocs(collection(db,"checkins"));
  const priceSnap = await getDocs(collection(db,"prices"));

  let myCheckins = 0;
  let myPrices = 0;

  checkSnap.forEach(d=>{
    if(d.data().userId === user.uid) myCheckins++;
  });

  priceSnap.forEach(d=>{
    if(d.data().userId === user.uid) myPrices++;
  });

  const xp = xpFromData(myCheckins, myPrices);

  document.getElementById("xpCard").innerHTML = `
    <b>${getBadge(xp)}</b><br>
    XP: ${xp}<br>
    Check-ins: ${myCheckins}<br>
    Prices submitted: ${myPrices}
  `;

  buildRadar(priceSnap);
}

function buildRadar(priceSnap){
  let prices = [];

  priceSnap.forEach(d=>{
    prices.push(d.data());
  });

  prices.sort((a,b)=>a.price - b.price);

  const top = prices.slice(0,3);

  const el = document.getElementById("cheapest");
  el.innerHTML = "";

  top.forEach(p=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <b>${p.pubName}</b><br>
      ${p.drinkName} £${p.price}
    `;
    el.appendChild(div);
  });
}

load();
</script>

</body>
</html>
