<!DOCTYPE html>
<html>
<head>
  <title>Pint Signal</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand-title">Pint Signal</div>
    <div class="menu">
      <a href="passport.html">Passport</a>
    </div>
  </div>
</div>

<div id="map"></div>
<div class="map-fog"></div>

<div class="panel-floating" id="uiCard">
  <div class="panel-title">Signal Network</div>
  <div class="panel-sub">Unlock districts to reveal pubs</div>

  <div id="progressText">0 Signals Active</div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <button onclick="centerOnUser()">Center on me</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([51.505, -0.09], 14);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(map);

let signals = [
  {id:1,lat:51.5,lng:-0.12},
  {id:2,lat:51.51,lng:-0.13},
  {id:3,lat:51.49,lng:-0.11}
];

let unlocked = JSON.parse(localStorage.getItem("signals")||"[]");

signals.forEach(s=>{
  let marker = L.marker([s.lat,s.lng],{
    icon:L.divIcon({
      html:`
      <div class="signal-marker">
        <div class="signal-core">📡</div>
        <div class="signal-ring signal-ring-1"></div>
        <div class="signal-ring signal-ring-2"></div>
      </div>`
    })
  }).addTo(map);

  marker.on("click",()=>{
    if(!unlocked.includes(s.id)){
      unlocked.push(s.id);
      localStorage.setItem("signals",JSON.stringify(unlocked));
      updateUI();
    }
  });
});

function updateUI(){
  let percent = (unlocked.length / signals.length)*100;
  document.getElementById("progressFill").style.width = percent+"%";
  document.getElementById("progressText").innerText =
    unlocked.length+" / "+signals.length+" Signals Active";
}

updateUI();

function centerOnUser(){
  navigator.geolocation.getCurrentPosition(pos=>{
    map.setView([pos.coords.latitude,pos.coords.longitude],16);
  });
}
</script>

</body>
</html>
