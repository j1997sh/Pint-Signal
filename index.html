<!DOCTYPE html>
<html>
<head>
  <title>Pint Signal</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>

<body>

<header class="topbar">
  <div class="brand-title">Pint Signal 🍺</div>
  <nav class="menu">
    <a href="index.html">Home</a>
    <a href="passport.html">Passport</a>
    <a href="activity.html">Activity</a>
  </nav>
</header>

<main class="page">

<h2>Your Progress</h2>
<div id="xpCard" class="card"></div>

<h2>Map</h2>
<div id="map"></div>

<h2>Cheap Pint Radar</h2>
<div id="cheapest"></div>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyB...",
  authDomain:"pintsignal.firebaseapp.com",
  projectId:"pintsignal"
});

const db = getFirestore(app);
const auth = getAuth(app);

let map = L.map('map').setView([51.5,-0.12],15);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let user;
let pubs = [];

function pintIcon(){
  return L.divIcon({html:"🍺",className:"pint"});
}

navigator.geolocation.watchPosition(pos=>{
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  map.setView([lat,lng],16);
});

async function load(){
  const u = await signInAnonymously(auth);
  user = u.user;

  const pubSnap = await getDocs(collection(db,"pubs"));
  const priceSnap = await getDocs(collection(db,"prices"));
  const checkSnap = await getDocs(collection(db,"checkins"));

  let myC=0,myP=0;

  checkSnap.forEach(d=>{if(d.data().userId===user.uid) myC++;});
  priceSnap.forEach(d=>{if(d.data().userId===user.uid) myP++;});

  const xp = (myC*10)+(myP*15);

  document.getElementById("xpCard").innerHTML =
    `<b>XP: ${xp}</b><br>Check-ins: ${myC}<br>Prices: ${myP}`;

  pubSnap.forEach(doc=>{
    const p = doc.data();
    p.id=doc.id;
    pubs.push(p);

    const m = L.marker([p.lat,p.lng],{icon:pintIcon()}).addTo(map);
    m.on("click",()=>window.location="pub.html?id="+p.id);
  });

  let prices=[];
  priceSnap.forEach(d=>prices.push(d.data()));
  prices.sort((a,b)=>a.price-b.price);

  prices.slice(0,3).forEach(p=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`${p.pubName}<br>${p.drinkName} £${p.price}`;
    document.getElementById("cheapest").appendChild(div);
  });
}

load();
</script>

</body>
</html>
