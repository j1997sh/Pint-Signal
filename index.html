<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pint Signal</title>

  <link rel="stylesheet" href="style.css" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>Pint Signal 🍺</h1>
      <p class="subtitle">Live pub map for Westminster</p>
    </header>

    <section class="controls">
      <button onclick="loadWestminsterPubs()">Load Westminster Pubs</button>
      <button onclick="refreshPubs()">Refresh Pubs</button>
      <button onclick="centerOnUser()">Center On Me</button>
    </section>

    <section class="status-wrap">
      <div id="status">Loading map...</div>
    </section>

    <section class="map-wrap">
      <div id="map"></div>
    </section>

    <section class="selected-wrap">
      <h2>Selected Pub</h2>
      <div id="selectedPubPanel" class="selected-panel empty">
        Tap a pub marker or pub card to select a pub.
      </div>
    </section>

    <section class="list-wrap">
      <h2>Pubs</h2>
      <div id="pubList" class="pub-list"></div>
    </section>

    <section class="list-wrap">
      <h2>Recent Check-Ins</h2>
      <div id="checkinList" class="checkin-list"></div>
    </section>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      where,
      orderBy,
      limit
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBajTBhYOCXbprdx9ZhxpFny_knmTHstnA",
      authDomain: "pintsignal.firebaseapp.com",
      projectId: "pintsignal",
      storageBucket: "pintsignal.firebasestorage.app",
      messagingSenderId: "63376472196",
      appId: "1:63376472196:web:2a5bbd8aa62ca176cf6ad1"
    };

    const CHECKIN_RADIUS_METERS = 50;
    const CHECKIN_COOLDOWN_MINUTES = 60;

    const westminsterPubs = [
      {
        name: "Two Chairmen",
        area: "Westminster",
        lat: 51.5006512,
        lng: -0.1316484,
        tags: ["historic", "classic"]
      },
      {
        name: "Buckingham Arms",
        area: "Westminster",
        lat: 51.4991812,
        lng: -0.1368225,
        tags: ["ale", "local"]
      },
      {
        name: "The Red Lion, Parliament Street",
        area: "Westminster",
        lat: 51.5020777,
        lng: -0.1257325,
        tags: ["politics", "iconic"]
      },
      {
        name: "St Stephen's Tavern",
        area: "Westminster",
        lat: 51.5011626,
        lng: -0.1256042,
        tags: ["tourist", "historic"]
      },
      {
        name: "Westminster Arms",
        area: "Westminster",
        lat: 51.5005932,
        lng: -0.1297727,
        tags: ["ale", "classic"]
      }
    ];

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const statusEl = document.getElementById("status");
    const pubListEl = document.getElementById("pubList");
    const selectedPubPanelEl = document.getElementById("selectedPubPanel");
    const checkinListEl = document.getElementById("checkinList");

    let map;
    let userMarker = null;
    let accuracyCircle = null;
    let pubMarkers = [];
    let userLatLng = null;
    let currentUser = null;
    let allPubs = [];
    let selectedPub = null;

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function toRadians(value) {
      return (value * Math.PI) / 180;
    }

    function distanceInMeters(lat1, lng1, lat2, lng2) {
      const earthRadius = 6371000;
      const dLat = toRadians(lat2 - lat1);
      const dLng = toRadians(lng2 - lng1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRadians(lat1)) *
          Math.cos(toRadians(lat2)) *
          Math.sin(dLng / 2) *
          Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return Math.round(earthRadius * c);
    }

    function formatDistance(meters) {
      if (meters < 1000) return `${meters}m away`;
      return `${(meters / 1000).toFixed(2)}km away`;
    }

    function formatTimeAgo(timestampMs) {
      const diffMs = Date.now() - timestampMs;
      const diffMinutes = Math.floor(diffMs / 60000);

      if (diffMinutes < 1) return "just now";
      if (diffMinutes === 1) return "1 minute ago";
      if (diffMinutes < 60) return `${diffMinutes} minutes ago`;

      const diffHours = Math.floor(diffMinutes / 60);
      if (diffHours === 1) return "1 hour ago";
      if (diffHours < 24) return `${diffHours} hours ago`;

      const diffDays = Math.floor(diffHours / 24);
      if (diffDays === 1) return "1 day ago";
      return `${diffDays} days ago`;
    }

    function initMap() {
      map = L.map("map").setView([51.5007, -0.1290], 15);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);

      setStatus("Map loaded. Signing in...");
    }

    function clearPubMarkers() {
      pubMarkers.forEach(marker => map.removeLayer(marker));
      pubMarkers = [];
    }

    function getDistanceToPub(pub) {
      if (!userLatLng) return null;
      return distanceInMeters(userLatLng.lat, userLatLng.lng, pub.lat, pub.lng);
    }

    function isUserInRange(pub) {
      const distance = getDistanceToPub(pub);
      if (distance === null) return false;
      return distance <= CHECKIN_RADIUS_METERS;
    }

    function renderSelectedPub() {
      if (!selectedPub) {
        selectedPubPanelEl.className = "selected-panel empty";
        selectedPubPanelEl.innerHTML = "Tap a pub marker or pub card to select a pub.";
        return;
      }

      const distance = getDistanceToPub(selectedPub);
      const inRange = isUserInRange(selectedPub);

      selectedPubPanelEl.className = "selected-panel";

      selectedPubPanelEl.innerHTML = `
        <div class="selected-title">${selectedPub.name}</div>
        <div class="selected-meta">${selectedPub.area} • ${(selectedPub.tags || []).join(", ")}</div>
        <div class="selected-meta">${selectedPub.lat.toFixed(5)}, ${selectedPub.lng.toFixed(5)}</div>
        <div class="selected-distance">
          ${
            distance === null
              ? "Allow location to see your distance."
              : `${formatDistance(distance)} • ${inRange ? "You can check in" : `Need to be within ${CHECKIN_RADIUS_METERS}m`}`
          }
        </div>
        <div class="selected-actions">
          <button onclick="checkInSelectedPub()">Check In Here</button>
        </div>
      `;
    }

    function selectPub(pub, zoomToMap = true) {
      selectedPub = pub;
      renderSelectedPub();

      if (zoomToMap) {
        map.setView([pub.lat, pub.lng], 17);
      }
    }

    function renderPubList(pubs) {
      pubListEl.innerHTML = "";

      if (pubs.length === 0) {
        pubListEl.innerHTML = '<div class="empty-state">No pubs found yet.</div>';
        return;
      }

      const sortedPubs = [...pubs].sort((a, b) => {
        if (!userLatLng) return a.name.localeCompare(b.name);

        const distanceA = distanceInMeters(userLatLng.lat, userLatLng.lng, a.lat, a.lng);
        const distanceB = distanceInMeters(userLatLng.lat, userLatLng.lng, b.lat, b.lng);
        return distanceA - distanceB;
      });

      sortedPubs.forEach(pub => {
        const card = document.createElement("button");
        card.className = "pub-card";
        card.type = "button";

        if (selectedPub && selectedPub.id === pub.id) {
          card.classList.add("selected");
        }

        const title = document.createElement("div");
        title.className = "pub-name";
        title.textContent = pub.name;

        const meta = document.createElement("div");
        meta.className = "pub-meta";
        meta.textContent = `${pub.area} • ${(pub.tags || []).join(", ")}`;

        const coords = document.createElement("div");
        coords.className = "pub-coords";
        coords.textContent = `${pub.lat.toFixed(5)}, ${pub.lng.toFixed(5)}`;

        card.appendChild(title);
        card.appendChild(meta);

        const distance = getDistanceToPub(pub);
        if (distance !== null) {
          const distanceEl = document.createElement("div");
          distanceEl.className = "pub-distance";
          distanceEl.textContent = formatDistance(distance);
          card.appendChild(distanceEl);
        }

        card.appendChild(coords);

        card.addEventListener("click", () => {
          selectPub(pub, true);
          renderPubList(allPubs);
        });

        pubListEl.appendChild(card);
      });
    }

    function renderPubMarkers(pubs) {
      clearPubMarkers();

      pubs.forEach(pub => {
        const distance = getDistanceToPub(pub);
        const distanceText = distance !== null ? `<br><strong>${formatDistance(distance)}</strong>` : "";

        const marker = L.marker([pub.lat, pub.lng]).addTo(map);

        marker.bindPopup(`
          <div style="min-width: 180px;">
            <strong>${pub.name}</strong><br>
            ${pub.area}<br>
            ${(pub.tags || []).join(", ")}
            ${distanceText}
          </div>
        `);

        marker.on("click", () => {
          selectPub(pub, false);
          renderPubList(allPubs);
        });

        pubMarkers.push(marker);
      });
    }

    async function renderRecentCheckins() {
      checkinListEl.innerHTML = "";

      const q = query(
        collection(db, "checkins"),
        orderBy("createdAtMs", "desc"),
        limit(10)
      );

      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        checkinListEl.innerHTML = '<div class="empty-state">No check-ins yet.</div>';
        return;
      }

      snapshot.forEach(doc => {
        const data = doc.data();

        const card = document.createElement("div");
        card.className = "checkin-card";

        const title = document.createElement("div");
        title.className = "checkin-title";
        title.textContent = data.pubName || "Unknown pub";

        const meta = document.createElement("div");
        meta.className = "checkin-meta";
        meta.textContent = `User ${String(data.userId || "").slice(0, 8)} • ${formatTimeAgo(data.createdAtMs || Date.now())}`;

        card.appendChild(title);
        card.appendChild(meta);
        checkinListEl.appendChild(card);
      });
    }

    async function pubExistsByName(name) {
      const pubsRef = collection(db, "pubs");
      const q = query(pubsRef, where("name", "==", name));
      const snapshot = await getDocs(q);
      return !snapshot.empty;
    }

    async function loadPubsFromFirestore() {
      setStatus("Loading pubs from Firebase...");

      const snapshot = await getDocs(collection(db, "pubs"));
      const pubs = [];

      snapshot.forEach(doc => {
        const data = doc.data();

        pubs.push({
          id: doc.id,
          name: data.name,
          area: data.area || "Unknown area",
          lat: Number(data.lat),
          lng: Number(data.lng),
          tags: Array.isArray(data.tags) ? data.tags : []
        });
      });

      allPubs = pubs;

      if (selectedPub) {
        const updatedSelectedPub = pubs.find(pub => pub.id === selectedPub.id);
        if (updatedSelectedPub) {
          selectedPub = updatedSelectedPub;
        }
      }

      renderPubMarkers(pubs);
      renderPubList(pubs);
      renderSelectedPub();

      setStatus(`Loaded ${pubs.length} pub${pubs.length === 1 ? "" : "s"}.`);
    }

    async function loadWestminsterPubs() {
      try {
        setStatus("Adding Westminster pubs...");

        for (const pub of westminsterPubs) {
          const exists = await pubExistsByName(pub.name);

          if (!exists) {
            await addDoc(collection(db, "pubs"), pub);
          }
        }

        await loadPubsFromFirestore();
      } catch (error) {
        console.error(error);
        setStatus(`Could not add pubs: ${error.message}`);
      }
    }

    async function refreshPubs() {
      try {
        await loadPubsFromFirestore();
        await renderRecentCheckins();
      } catch (error) {
        console.error(error);
        setStatus(`Could not refresh pubs: ${error.message}`);
      }
    }

    function updateUserLocation(lat, lng, accuracy) {
      userLatLng = { lat, lng };

      if (!userMarker) {
        userMarker = L.marker([lat, lng]).addTo(map).bindPopup("You are here");
      } else {
        userMarker.setLatLng([lat, lng]);
      }

      if (!accuracyCircle) {
        accuracyCircle = L.circle([lat, lng], {
          radius: accuracy,
          color: "#2f80ed",
          fillColor: "#2f80ed",
          fillOpacity: 0.12
        }).addTo(map);
      } else {
        accuracyCircle.setLatLng([lat, lng]);
        accuracyCircle.setRadius(accuracy);
      }

      renderPubMarkers(allPubs);
      renderPubList(allPubs);
      renderSelectedPub();
    }

    function startLiveLocation() {
      if (!("geolocation" in navigator)) {
        setStatus("Geolocation is not supported on this device.");
        return;
      }

      setStatus("Requesting your live location...");

      navigator.geolocation.watchPosition(
        position => {
          const { latitude, longitude, accuracy } = position.coords;

          updateUserLocation(latitude, longitude, accuracy);

          if (map) {
            map.setView([latitude, longitude], 16);
          }

          setStatus("Live location active.");
        },
        error => {
          console.error(error);
          setStatus("Location permission was denied or unavailable.");
        },
        {
          enableHighAccuracy: true,
          maximumAge: 10000,
          timeout: 10000
        }
      );
    }

    function centerOnUser() {
      if (!userLatLng) {
        setStatus("Your location is not ready yet.");
        return;
      }

      map.setView([userLatLng.lat, userLatLng.lng], 16);
      if (userMarker) {
        userMarker.openPopup();
      }
    }

    async function getLatestCheckinForPub(pubId, userId) {
      const q = query(
        collection(db, "checkins"),
        where("pubId", "==", pubId),
        where("userId", "==", userId)
      );

      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        return null;
      }

      let latest = null;

      snapshot.forEach(doc => {
        const data = doc.data();
        if (!latest || (data.createdAtMs || 0) > (latest.createdAtMs || 0)) {
          latest = data;
        }
      });

      return latest;
    }

    async function checkInSelectedPub() {
      if (!selectedPub) {
        setStatus("Select a pub first.");
        return;
      }

      if (!currentUser) {
        setStatus("User not ready yet.");
        return;
      }

      if (!userLatLng) {
        setStatus("Your live location is not ready yet.");
        return;
      }

      const distance = getDistanceToPub(selectedPub);

      if (distance === null || distance > CHECKIN_RADIUS_METERS) {
        setStatus(`Too far away. You must be within ${CHECKIN_RADIUS_METERS}m to check in.`);
        return;
      }

      try {
        setStatus(`Checking in at ${selectedPub.name}...`);

        const latestCheckin = await getLatestCheckinForPub(selectedPub.id, currentUser.uid);

        if (latestCheckin) {
          const minutesSinceLastCheckin = Math.floor((Date.now() - latestCheckin.createdAtMs) / 60000);

          if (minutesSinceLastCheckin < CHECKIN_COOLDOWN_MINUTES) {
            const minutesLeft = CHECKIN_COOLDOWN_MINUTES - minutesSinceLastCheckin;
            setStatus(`Cooldown active. Try again in ${minutesLeft} minute${minutesLeft === 1 ? "" : "s"}.`);
            return;
          }
        }

        await addDoc(collection(db, "checkins"), {
          pubId: selectedPub.id,
          pubName: selectedPub.name,
          userId: currentUser.uid,
          userLat: userLatLng.lat,
          userLng: userLatLng.lng,
          createdAtMs: Date.now(),
          createdAtIso: new Date().toISOString()
        });

        setStatus(`Checked in at ${selectedPub.name}.`);
        await renderRecentCheckins();
      } catch (error) {
        console.error(error);
        setStatus(`Check-in failed: ${error.message}`);
      }
    }

    window.loadWestminsterPubs = loadWestminsterPubs;
    window.refreshPubs = refreshPubs;
    window.centerOnUser = centerOnUser;
    window.checkInSelectedPub = checkInSelectedPub;

    async function startApp() {
      try {
        initMap();
        const authResult = await signInAnonymously(auth);
        currentUser = authResult.user;
        setStatus("Signed in. Loading pubs...");
        await loadPubsFromFirestore();
        await renderRecentCheckins();
        startLiveLocation();
      } catch (error) {
        console.error(error);
        setStatus(`Startup error: ${error.message}`);
      }
    }

    startApp();
  </script>
</body>
</html>
