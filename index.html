<!DOCTYPE html>
<html>
<head>
  <title>Pint Signal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Pint Signal 🍺</h1>

  <div class="button-row">
    <button onclick="seedPubs()">Load Westminster Pubs</button>
    <button onclick="clearListOnly()">Refresh List</button>
  </div>

  <ul id="pubList"></ul>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBajTBhYOCXbprdx9ZhxpFny_knmTHstnA",
      authDomain: "pintsignal.firebaseapp.com",
      projectId: "pintsignal",
      storageBucket: "pintsignal.firebasestorage.app",
      messagingSenderId: "63376472196",
      appId: "1:63376472196:web:2a5bbd8aa62ca176cf6ad1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const pubList = document.getElementById("pubList");

    const westminsterPubs = [
      {
        name: "Two Chairmen",
        area: "Westminster",
        lat: 51.5006512,
        lng: -0.1316484,
        tags: ["historic", "classic"]
      },
      {
        name: "Buckingham Arms",
        area: "Westminster",
        lat: 51.4991812,
        lng: -0.1368225,
        tags: ["ale", "local"]
      },
      {
        name: "The Red Lion, Parliament Street",
        area: "Westminster",
        lat: 51.5020777,
        lng: -0.1257325,
        tags: ["politics", "iconic"]
      },
      {
        name: "St Stephen's Tavern",
        area: "Westminster",
        lat: 51.5011626,
        lng: -0.1256042,
        tags: ["tourist", "historic"]
      },
      {
        name: "Westminster Arms",
        area: "Westminster",
        lat: 51.5005932,
        lng: -0.1297727,
        tags: ["ale", "classic"]
      }
    ];

    await signInAnonymously(auth);

    async function loadPubs() {
      pubList.innerHTML = "";

      const snapshot = await getDocs(collection(db, "pubs"));

      if (snapshot.empty) {
        const li = document.createElement("li");
        li.textContent = "No pubs loaded yet.";
        pubList.appendChild(li);
        return;
      }

      snapshot.forEach((doc) => {
        const pub = doc.data();

        const li = document.createElement("li");
        li.className = "pub-item";

        const title = document.createElement("div");
        title.className = "pub-name";
        title.textContent = pub.name || "Unnamed pub";

        const meta = document.createElement("div");
        meta.className = "pub-meta";
        meta.textContent = `${pub.area || "Unknown area"} • ${Array.isArray(pub.tags) ? pub.tags.join(", ") : ""}`;

        li.appendChild(title);
        li.appendChild(meta);
        pubList.appendChild(li);
      });
    }

    async function pubExistsByName(name) {
      const pubsRef = collection(db, "pubs");
      const q = query(pubsRef, where("name", "==", name));
      const snapshot = await getDocs(q);
      return !snapshot.empty;
    }

    async function seedPubs() {
      for (const pub of westminsterPubs) {
        const exists = await pubExistsByName(pub.name);

        if (!exists) {
          await addDoc(collection(db, "pubs"), pub);
        }
      }

      await loadPubs();
    }

    async function clearListOnly() {
      await loadPubs();
    }

    window.seedPubs = seedPubs;
    window.clearListOnly = clearListOnly;

    await loadPubs();
  </script>
</body>
</html>
