<!DOCTYPE html>
<html>
<head>
  <title>Pint Signal</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>

<header class="topbar">
  <div class="brand-title">Pint Signal 🍺</div>
  <nav class="menu">
    <a href="index.html">Home</a>
    <a href="activity.html">Activity</a>
  </nav>
</header>

<main class="page">

<h2>Map</h2>
<div id="map"></div>

<div class="controls">
  <button onclick="centerOnUser()">Center On Me</button>
</div>

<h2>Cheapest Nearby</h2>
<div id="cheapest"></div>

<h2>Pubs</h2>
<div id="pubList"></div>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR KEY",
  authDomain: "pintsignal.firebaseapp.com",
  projectId: "pintsignal"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let map = L.map('map').setView([51.5007, -0.129], 15);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let userLatLng = null;
let pubs = [];

navigator.geolocation.watchPosition(pos => {
  userLatLng = [pos.coords.latitude, pos.coords.longitude];
});

function distance(a,b,c,d){
  return Math.sqrt((a-c)**2+(b-d)**2);
}

function pintIcon(){
  return L.divIcon({html:"🍺", className:"pint"});
}

async function loadPubs(){
  const snap = await getDocs(collection(db,"pubs"));
  pubs = [];
  snap.forEach(doc=>{
    const p = doc.data();
    p.id = doc.id;
    pubs.push(p);

    const marker = L.marker([p.lat,p.lng],{icon:pintIcon()}).addTo(map);

    marker.on("click",()=>{
      window.location.href = "pub.html?id="+p.id;
    });
  });

  renderList();
  buildCheapest();
}

function renderList(){
  const el = document.getElementById("pubList");
  el.innerHTML = "";

  pubs.forEach(p=>{
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<b>${p.name}</b><br>${p.area}`;
    div.onclick = ()=>window.location.href="pub.html?id="+p.id;
    el.appendChild(div);
  });
}

async function getLatest(pubId){
  const q = query(collection(db,"prices"),where("pubId","==",pubId),orderBy("createdAtMs","desc"),limit(1));
  const s = await getDocs(q);
  if(s.empty) return null;
  return s.docs[0].data();
}

async function buildCheapest(){
  if(!userLatLng) return;

  let best = null;

  for(const p of pubs){
    const price = await getLatest(p.id);
    if(!price) continue;

    if(!best || price.price < best.price){
      best = {p,price};
    }
  }

  if(best){
    document.getElementById("cheapest").innerHTML =
      `<div class="card">
        <b>${best.p.name}</b><br>
        ${best.price.drinkName} £${best.price.price}
      </div>`;
  }
}

window.centerOnUser = ()=> map.setView(userLatLng,16);

loadPubs();
</script>

</body>
</html>
