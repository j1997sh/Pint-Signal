<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand-title">Pint Signal 🍺</div>
        <div class="brand-subtitle">Pub details</div>
      </div>

      <nav class="menu">
        <a href="index.html">Home</a>
        <a href="passport.html">Passport</a>
        <a href="activity.html">Activity</a>
      </nav>
    </div>
  </header>

  <main class="page page-narrow">
    <section class="panel">
      <a href="index.html" class="back-link">← Back to map</a>
      <div id="hero" class="place-card loading-card">Loading pub...</div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Actions</h2>
        <p>Check in and submit the latest pint price</p>
      </div>

      <div class="controls-row">
        <button onclick="checkIn()">Check In</button>
      </div>

      <div class="form-grid form-grid-top">
        <label class="form-field">
          <span>Drink</span>
          <input id="drink" placeholder="Drink" />
        </label>

        <label class="form-field">
          <span>Price (£)</span>
          <input id="price" placeholder="Price" type="number" step="0.01" min="0" />
        </label>
      </div>

      <div class="controls-row">
        <button onclick="submit()">Submit Price</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>History</h2>
        <p>Recent submitted prices for this pub</p>
      </div>
      <div id="history" class="stack-list"></div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      collection,
      addDoc,
      query,
      where,
      orderBy,
      getDocs
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyBajTBhYOCXbprdx9ZhxpFny_knmTHstnA",
      authDomain: "pintsignal.firebaseapp.com",
      projectId: "pintsignal"
    });

    const db = getFirestore(app);
    const auth = getAuth(app);

    const id = new URLSearchParams(location.search).get("id");
    const heroEl = document.getElementById("hero");
    const historyEl = document.getElementById("history");

    let user;
    let pub;

    async function load() {
      const authResult = await signInAnonymously(auth);
      user = authResult.user;

      const pubDoc = await getDoc(doc(db, "pubs", id));

      if (!pubDoc.exists()) {
        heroEl.innerHTML = "Pub not found.";
        return;
      }

      pub = pubDoc.data();

      heroEl.className = "place-card";
      heroEl.innerHTML = `
        <div class="place-card-top">
          <div class="place-emoji">🍺</div>
          <div class="place-head">
            <div class="place-title">${pub.name}</div>
            <div class="place-subtitle">${pub.area || "Westminster"}</div>
          </div>
        </div>

        <div class="place-chip-row">
          ${(pub.tags || []).map(tag => `<span class="place-chip">${tag}</span>`).join("")}
        </div>

        <div class="place-stats">
          <div class="place-stat">
            <div class="place-stat-label">Latitude</div>
            <div class="place-stat-value">${Number(pub.lat).toFixed(4)}</div>
          </div>
          <div class="place-stat">
            <div class="place-stat-label">Longitude</div>
            <div class="place-stat-value">${Number(pub.lng).toFixed(4)}</div>
          </div>
          <div class="place-stat">
            <div class="place-stat-label">Game Value</div>
            <div class="place-stat-value">Passport Stamp</div>
          </div>
        </div>
      `;

      await loadHistory();
    }

    async function loadHistory() {
      historyEl.innerHTML = "";

      const q = query(
        collection(db, "prices"),
        where("pubId", "==", id),
        orderBy("createdAtMs", "desc")
      );

      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        historyEl.innerHTML = `<div class="empty-state">No prices submitted yet.</div>`;
        return;
      }

      snapshot.forEach(doc => {
        const data = doc.data();
        const div = document.createElement("div");
        div.className = "stack-card";
        div.innerHTML = `
          <div class="stack-title">${data.drinkName} • £${Number(data.price).toFixed(2)}</div>
          <div class="stack-meta">${data.note || "User submitted price"}</div>
        `;
        historyEl.appendChild(div);
      });
    }

    async function submit() {
      const drinkInput = document.getElementById("drink");
      const priceInput = document.getElementById("price");

      const drinkName = drinkInput.value.trim();
      const priceValue = Number(priceInput.value);

      if (!drinkName) {
        alert("Enter a drink name.");
        return;
      }

      if (Number.isNaN(priceValue) || priceValue <= 0) {
        alert("Enter a valid price.");
        return;
      }

      await addDoc(collection(db, "prices"), {
        pubId: id,
        pubName: pub.name,
        userId: user.uid,
        drinkName,
        price: priceValue,
        createdAtMs: Date.now()
      });

      alert("+15 XP");
      location.reload();
    }

    async function checkIn() {
      await addDoc(collection(db, "checkins"), {
        pubId: id,
        pubName: pub.name,
        userId: user.uid,
        createdAtMs: Date.now()
      });

      alert("+10 XP");
    }

    window.submit = submit;
    window.checkIn = checkIn;

    load();
  </script>
</body>
</html>
