<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pub</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
<header class="topbar">
  <div class="topbar-inner">
    <div>
      <div class="brand-title">Pint Signal 🍺</div>
      <div class="brand-subtitle">Pub</div>
    </div>

    <nav class="menu">
      <a href="index.html">Map</a>
      <a href="passport.html">Passport</a>
      <a href="leaderboard.html">Leaderboard</a>
    </nav>
  </div>
</header>

<main class="page page-narrow">
  <a href="index.html" class="back-link">← Back to map</a>

  <div id="pub"></div>

  <button id="checkin">Check In</button>
</main>

<script type="module">
import { westminsterPubs } from "./westminster-pubs.js";

const params = new URLSearchParams(location.search);
const id = params.get("id");

const pub = westminsterPubs.find(p => p.id === id);

if (!pub) {
  document.getElementById("pub").innerText = "Pub not found";
} else {
  document.getElementById("pub").innerHTML = `
    <h2>${pub.name}</h2>
    <p>${pub.address || ""}</p>
  `;
}

document.getElementById("checkin").onclick = () => {
  let visited = new Set(JSON.parse(localStorage.getItem("visitedPubs") || "[]"));
  visited.add(id);
  localStorage.setItem("visitedPubs", JSON.stringify([...visited]));
  alert("Checked in ✔");
};
</script>

</body>
</html>
