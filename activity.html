<!DOCTYPE html>
<html>
<head>
  <title>Activity</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <a href="index.html">← Home</a>
</header>

<main class="page">

<h2>Recent Prices</h2>
<div id="prices"></div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIzaSyB...",
  authDomain:"pintsignal.firebaseapp.com",
  projectId:"pintsignal"
});

const db=getFirestore(app);

async function load(){
  const s=await getDocs(collection(db,"prices"));
  s.forEach(doc=>{
    const d=doc.data();
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`${d.pubName}<br>${d.drinkName} £${d.price}`;
    document.getElementById("prices").appendChild(div);
  });
}

load();
</script>

</body>
</html>
