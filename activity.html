<!DOCTYPE html>
<html>
<head>
  <title>Activity</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <a href="index.html">← Back</a>
</header>

<main class="page">

<h2>Recent Prices</h2>
<div id="prices"></div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR KEY",
  authDomain: "pintsignal.firebaseapp.com",
  projectId: "pintsignal"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function load(){
  const q = query(collection(db,"prices"),orderBy("createdAtMs","desc"),limit(20));
  const s = await getDocs(q);

  s.forEach(doc=>{
    const d = doc.data();
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML=`${d.pubName || ""}<br>${d.drinkName} £${d.price}`;
    document.getElementById("prices").appendChild(div);
  });
}

load();
</script>

</body>
</html>
