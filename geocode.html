<!DOCTYPE html>
<html>
<body>
<script type="module">
import { westminsterPubs } from "./westminster-pubs.js";

async function geocode(pub) {
  const query = encodeURIComponent(pub.address + ", London");
  const url = `https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (data.length > 0) {
      return {
        ...pub,
        lat: parseFloat(data[0].lat),
        lng: parseFloat(data[0].lon)
      };
    }
  } catch (e) {}

  return pub;
}

async function run() {
  const results = [];

  for (let pub of westminsterPubs) {
    console.log("Geocoding:", pub.name);
    const updated = await geocode(pub);
    results.push(updated);

    // slow down to avoid rate limits
    await new Promise(r => setTimeout(r, 1000));
  }

  console.log("DONE:");
  console.log(JSON.stringify(results, null, 2));
}

run();
</script>
</body>
</html>
